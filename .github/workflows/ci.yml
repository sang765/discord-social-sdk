name: CI

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Build SDK
        run: ./gradlew :sdk:assembleRelease --no-daemon

      - name: Run tests
        run: ./gradlew :sdk:test --no-daemon || true

      - name: Publish to MavenLocal
        run: ./gradlew :sdk:publishToMavenLocal --no-daemon

      - name: Upload AAR
        uses: actions/upload-artifact@v4
        with:
          name: discord-social-sdk-release
          path: sdk/build/outputs/aar/sdk-release.aar

  tag-release:
    name: Tag Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [ build ]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download AAR
        uses: actions/download-artifact@v4
        with:
          name: discord-social-sdk-release
          path: dist

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/sdk-release.aar
          generate_release_notes: true
